<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Service Blueprint Mini preview</title>
  <desc id="desc">A blue service delivery board with stage health, handoff tracking, and weak-point detection.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#09131a" />
      <stop offset="100%" stop-color="#04080b" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#7dd3fc" />
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)" />
  <rect x="36" y="32" width="888" height="84" rx="24" fill="#0b1620" stroke="#234964" />
  <text x="66" y="72" font-family="Inter, Arial, sans-serif" font-size="28" fill="#eef2ff">Service Blueprint Mini</text>
  <text x="66" y="96" font-family="Inter, Arial, sans-serif" font-size="14" fill="#b7c0d9">Map handoffs, ownership, health, and time-to-value across your delivery flow.</text>

  <rect x="36" y="138" width="888" height="118" rx="28" fill="#0b1620" stroke="#234964" />
  <rect x="62" y="164" width="184" height="68" rx="18" fill="#10202b" stroke="#234964" />
  <rect x="264" y="164" width="184" height="68" rx="18" fill="#10202b" stroke="#234964" />
  <rect x="466" y="164" width="184" height="68" rx="18" fill="#10202b" stroke="#234964" />
  <rect x="668" y="164" width="230" height="68" rx="18" fill="#10202b" stroke="#234964" />
  <text x="84" y="189" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Stages</text>
  <text x="84" y="220" font-family="Inter, Arial, sans-serif" font-size="26" fill="#eef2ff">8</text>
  <text x="286" y="189" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Fragile</text>
  <text x="286" y="220" font-family="Inter, Arial, sans-serif" font-size="26" fill="#eef2ff">2</text>
  <text x="488" y="189" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Average health</text>
  <text x="488" y="220" font-family="Inter, Arial, sans-serif" font-size="26" fill="#eef2ff">6.8 / 10</text>
  <text x="690" y="189" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Time to value</text>
  <text x="690" y="220" font-family="Inter, Arial, sans-serif" font-size="26" fill="#eef2ff">34 min</text>

  <rect x="36" y="278" width="522" height="226" rx="28" fill="#0b1620" stroke="#234964" />
  <text x="62" y="314" font-family="Inter, Arial, sans-serif" font-size="18" fill="#eef2ff">Weak point queue</text>
  <text x="62" y="336" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">See where delivery quality is wobbling before the client feels it.</text>
  <rect x="62" y="356" width="470" height="54" rx="18" fill="#10202b" stroke="#234964" />
  <text x="84" y="388" font-family="Inter, Arial, sans-serif" font-size="16" fill="#eef2ff">Expansion checkpoint</text>
  <text x="316" y="388" font-family="Inter, Arial, sans-serif" font-size="12" fill="#b5ecff">Health 4/10 · Founder</text>

  <rect x="62" y="422" width="470" height="54" rx="18" fill="#10202b" stroke="#234964" />
  <text x="84" y="454" font-family="Inter, Arial, sans-serif" font-size="16" fill="#eef2ff">Mid-project visibility update</text>
  <text x="340" y="454" font-family="Inter, Arial, sans-serif" font-size="12" fill="#b5ecff">45 min to value</text>

  <rect x="584" y="278" width="340" height="226" rx="28" fill="#0b1620" stroke="#234964" />
  <text x="610" y="314" font-family="Inter, Arial, sans-serif" font-size="18" fill="#eef2ff">Journey health</text>
  <text x="610" y="336" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b7c0d9">Balance fast client value with reliable internal handoffs.</text>
  <rect x="610" y="360" width="288" height="18" rx="9" fill="rgba(255,255,255,0.08)" />
  <rect x="610" y="360" width="226" height="18" rx="9" fill="url(#accent)" />
  <rect x="610" y="396" width="288" height="18" rx="9" fill="rgba(255,255,255,0.08)" />
  <rect x="610" y="396" width="174" height="18" rx="9" fill="url(#accent)" opacity="0.75" />
  <rect x="610" y="432" width="288" height="42" rx="14" fill="#10202b" stroke="#234964" />
  <text x="630" y="458" font-family="Inter, Arial, sans-serif" font-size="14" fill="#eef2ff">Discovery call -> scoped summary</text>
</svg>
